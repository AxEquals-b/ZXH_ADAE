version: 1
suite_id: dev_mpi_cuda
name: benchmark_dev_mpi_cuda
summary: Development-facing mpi_cuda benchmark suite for bundled QASM circuits with 16-24 active qubits

backend: mpi_cuda
deployment:
  nnodes: 2
  ntasks_per_node: 4
workloads:
  - qc_bigadder_n18_M16
  - qc_dnn_n16_M16
  - qc_qft_n18_M18
  - qc_bv_n19_M19
  - qc_adder_n28_M24
metrics: [compile_time_ms, execute_time_ms, sample_time_ms, total_time_ms]

shots: 4096
warmup: 1
repeats: 5
opt_level: 1
timeout_s: 300
